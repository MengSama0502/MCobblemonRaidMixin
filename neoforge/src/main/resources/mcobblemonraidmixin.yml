# ============================================================
# 7. 宝可梦 IV 生成覆盖规则（优先级高于全局模式）
# ============================================================
# 为特定宝可梦单独指定 IV 生成方式，支持四种模式
# 格式：宝可梦ID（同黑名单格式）: 规则值
# 注意：覆盖规则会完全覆盖全局模式，未指定的宝可梦继续使用全局模式

# 7.1 EXACT 精确覆盖
# 格式：精灵ID: [HP, 攻击, 防御, 特攻, 特防, 速度]
overrideExact:
  ditto: [31, 31, 31, 31, 31, 31]   # 百变怪固定全31

# 7.2 RANDOM 总和限制覆盖
# 格式：精灵ID: 最大总IV值（可选，不写则使用全局模式的 maxVPerTier）
overrideRandom:
  ditto: 120   # 百变怪使用 RANDOM 模式，总 IV 和上限 120

# 7.3 SET 模式覆盖
# 格式：精灵ID: [最小IV, 保证完美V数量, 最大IV]
# 说明：保证完美V数量 ≤ 6，非完美项在 [最小IV, 最大IV] 区间随机
overrideSet:
  ditto: [0, 2, 20]   # 百变怪：至少2项完美V，其余在0~20间随机

# 7.4 MIN_MAX 区间覆盖
# 格式：精灵ID: [最小范围, 最大范围]
# 说明：每项 IV 在该区间内独立随机
overrideMinMax: {}   # 示例：ditto: [10, 30]

# ============================================================
# 8. 巢穴完成奖励命令
# ============================================================
# 当玩家完成巢穴并获得奖励宝可梦时，可额外执行一条或多条命令
# 支持权重随机选择，支持占位符 {player}（玩家名）和 {tier}（星级 0~6）
# ============================================================
# 两种配置格式：
#   1. Map 格式（推荐）：
#      Tier1:
#        - command: "give {player} cobblemon:rare_candy 1"
#          weight: 50
#        - command: "give {player} cobblemon:super_rod 1"
#          weight: 30
#   2. List 格式（简洁，不指定权重则默认100）：
#      - - "give {player} cobblemon:rare_candy 1"
#        - "give {player} cobblemon:super_rod 1"
#      - []  # 空列表表示无奖励
# ============================================================
# 注意：命令前缀无需写斜杠（/），模组会自动处理；但写上也不影响。
# 命令以服务器 OP 权限（等级4）执行，请确保命令安全。

rewardCommandsPerTier:
  # 1星巢穴奖励（tierIndex = 0）
  Tier1: []
  # 2星
  Tier2: []
  # 3星
  Tier3: []
  # 4星
  Tier4: []
  # 5星
  Tier5: []
  # 6星
  Tier6: []
  # 7星
  Tier7: []

