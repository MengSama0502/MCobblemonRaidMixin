# ============================================================
# MCobblemonRaidMixin 模组配置文件
# 适用版本：Fabric 1.21.1+，依赖 Cobblemon 与 Necro Raid Dens
# ============================================================

# ============================================================
# 1. 全局 IV 生成模式
# ============================================================
# 语言设置，可选值: zh（中文）, en（英文）, th（泰文）
language: "zh"

# 可选值: SET, RANDOM, MIN_MAX, EXACT
#   SET    -> 固定若干项为 31（完美V），其余在区间内随机
#   RANDOM -> 限制总 IV 和（总 V 值），随机分配到六项
#   MIN_MAX-> 每项 IV 在独立区间内随机
#   EXACT  -> 严格按照每星级的精确 IV 数组指定
# 注意：若某宝可梦有单独覆盖规则，则覆盖规则优先于本设置
raidIVMode: "SET"

# ============================================================
# 2. SET 模式专用参数（仅当 raidIVMode = SET 时生效）
# ============================================================

# SET 模式下，每个星级（1~7星）保证的完美V（31）数量
# 顺序：第1个值对应1星，第7个值对应7星
# 取值范围：0 ~ 6，建议随星级递增
guaranteedVPerTier: [0, 1, 1, 1, 2, 2, 3]

# SET 模式下，每个星级每项 IV 的最小值（非完美项的范围下限）
# 与 maxIVPerTier 共同决定非完美项随机范围
minIVPerTier: [0, 0, 0, 0, 0, 0, 0]

# SET 模式下，每个星级每项 IV 的最大值（非完美项的范围上限）
maxIVPerTier: [20, 20, 20, 20, 20, 20, 20]

# ============================================================
# 3. RANDOM 模式专用参数（仅当 raidIVMode = RANDOM 时生效）
# ============================================================
# 每个星级允许的最大总 IV 和（六项 IV 总和）
# 每项 IV 范围 0~31，总和上限为 186。值越小，宝可梦整体 IV 越低
maxVPerTier: [80, 90, 100, 110, 120, 130, 140]

# ============================================================
# 4. MIN_MAX 模式专用参数（仅当 raidIVMode = MIN_MAX 时生效）
# ============================================================
# 每个星级每项 IV 的最小值（独立随机区间下限）
minIVRangePerTier: [0, 5, 10, 15, 20, 25, 31]

# 每个星级每项 IV 的最大值（独立随机区间上限）
maxIVRangePerTier: [10, 15, 20, 25, 31, 31, 31]

# ============================================================
# 5. EXACT 模式专用参数（仅当 raidIVMode = EXACT 时生效）
# ============================================================
# 精确指定每个星级（1~7星）的六维 IV 值
# 顺序必须为：[HP, 攻击, 防御, 特攻, 特防, 速度]
# 每个数组长度必须为 6，数值范围 0~31
exactIVsPerTier:
  - [31, 31, 31, 31, 31, 31]   # 1星
  - [31, 31, 31, 31, 31, 31]   # 2星
  - [31, 31, 31, 31, 31, 31]   # 3星
  - [31, 31, 31, 31, 31, 31]   # 4星
  - [31, 31, 31, 31, 31, 31]   # 5星
  - [31, 31, 31, 31, 31, 31]   # 6星
  - [31, 31, 31, 31, 31, 31]   # 7星

# ============================================================
