# ============================================================
# 7. Pokemon IV Generation Override Rules (priority over global mode)
# ============================================================
# Specify IV generation method for individual Pokemon, supports four modes
# Format: Pokemon ID (same format as blacklist): rule value
# Note: Override rules completely replace the global mode for that species

# 7.1 EXACT Override
# Format: species_id: [HP, Attack, Defense, Sp.Atk, Sp.Def, Speed]
overrideExact:
  ditto: [31, 31, 31, 31, 31, 31]   # Ditto fixed all 31s

# 7.2 RANDOM Total Sum Override
# Format: species_id: max total IV value (optional, uses global maxVPerTier if not specified)
overrideRandom:
  ditto: 120   # Ditto uses RANDOM mode, total IV cap 120

# 7.3 SET Mode Override
# Format: species_id: [minIV, guaranteed perfect IVs, maxIV]
# Note: guaranteed perfect IVs <= 6, non-perfect stats random within [minIV, maxIV]
overrideSet:
  ditto: [0, 2, 20]   # Ditto: at least 2 perfect IVs, rest random 0~20

# 7.4 MIN_MAX Range Override
# Format: species_id: [minRange, maxRange]
# Note: Each stat IV is independently randomized within this range
overrideMinMax: {}   # Example: ditto: [10, 30]

# ============================================================
# 8. Raid Completion Reward Commands
# ============================================================
# When a player completes a raid and receives a reward Pokemon, additional commands can be executed
# Supports weighted random selection, placeholders: {player} (player name), {tier} (tier 1~7), {tierIndex} (tier 0~6)
# ============================================================
# Two configuration formats:
#   1. Map format (recommended):
#      Tier1:
#        - command: "give {player} cobblemon:rare_candy 1"
#          weight: 50
#        - command: "give {player} cobblemon:super_rod 1"
#          weight: 30
#   2. List format (concise, default weight 100 if not specified):
#      - - "give {player} cobblemon:rare_candy 1"
#        - "give {player} cobblemon:super_rod 1"
#      - []  # Empty list means no reward
# ============================================================
# Note: No need to prefix commands with slash (/), the mod handles it automatically; adding one is also fine.
# Commands execute with server OP permission (level 4), ensure commands are safe.

rewardCommandsPerTier:
  # 1-star raid rewards (tierIndex = 0)
  Tier1: []
  # 2-star
  Tier2: []
  # 3-star
  Tier3: []
  # 4-star
  Tier4: []
  # 5-star
  Tier5: []
  # 6-star
  Tier6: []
  # 7-star
  Tier7: []

# More configuration examples (uncomment to enable):
