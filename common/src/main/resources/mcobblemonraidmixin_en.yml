# ============================================================
# MCobblemonRaidMixin Mod Configuration
# Compatible with: Fabric 1.21.1, requires Cobblemon and Necro Raid Dens
# ============================================================

# ============================================================
# 1. Global IV Generation Mode
# ============================================================
# Language setting, options: zh (Chinese), en (English), th (Thai)
language: "zh"

# Options: SET, RANDOM, MIN_MAX, EXACT
#   SET    -> Fix certain stats to 31 (perfect IVs), randomize the rest within a range
#   RANDOM -> Limit total IV sum (total V value), randomly distribute across six stats
#   MIN_MAX-> Each stat IV is randomized within an independent range
#   EXACT  -> Strictly follow the exact IV array specified per tier
# Note: If a Pokemon has a species-specific override, the override takes priority
raidIVMode: "SET"

# ============================================================
# 2. SET Mode Parameters (only effective when raidIVMode = SET)
# ============================================================

# Number of guaranteed perfect IVs (31) per tier (1~7 stars)
# Order: 1st value = 1-star, 7th value = 7-star
# Range: 0 ~ 6, recommended to increase with tier
guaranteedVPerTier: [0, 1, 1, 1, 2, 2, 3]

# Minimum IV value per stat for non-perfect stats in SET mode
# Works with maxIVPerTier to define the random range for non-perfect stats
minIVPerTier: [0, 0, 0, 0, 0, 0, 0]

# Maximum IV value per stat for non-perfect stats in SET mode
maxIVPerTier: [20, 20, 20, 20, 20, 20, 20]

# ============================================================
# 3. RANDOM Mode Parameters (only effective when raidIVMode = RANDOM)
# ============================================================
# Maximum total IV sum allowed per tier (sum of all six stats)
# Each stat ranges 0~31, total cap is 186. Lower values = weaker Pokemon overall
maxVPerTier: [80, 90, 100, 110, 120, 130, 140]

# ============================================================
# 4. MIN_MAX Mode Parameters (only effective when raidIVMode = MIN_MAX)
# ============================================================
# Minimum IV value per stat per tier (independent random range lower bound)
minIVRangePerTier: [0, 5, 10, 15, 20, 25, 31]

# Maximum IV value per stat per tier (independent random range upper bound)
maxIVRangePerTier: [10, 15, 20, 25, 31, 31, 31]

# ============================================================
# 5. EXACT Mode Parameters (only effective when raidIVMode = EXACT)
# ============================================================
# Exact IV values for each tier (1~7 stars)
# Order must be: [HP, Attack, Defense, Sp.Atk, Sp.Def, Speed]
# Each array must have exactly 6 elements, values 0~31
exactIVsPerTier:
  - [31, 31, 31, 31, 31, 31]   # 1-star
  - [31, 31, 31, 31, 31, 31]   # 2-star
  - [31, 31, 31, 31, 31, 31]   # 3-star
  - [31, 31, 31, 31, 31, 31]   # 4-star
  - [31, 31, 31, 31, 31, 31]   # 5-star
  - [31, 31, 31, 31, 31, 31]   # 6-star
  - [31, 31, 31, 31, 31, 31]   # 7-star

