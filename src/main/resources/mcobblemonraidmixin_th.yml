# ============================================================
# 7. กฎแทนที่การสร้าง IV ของโปเกมอน (มีความสำคัญเหนือกว่าโหมดทั่วไป)
# ============================================================
# กำหนดวิธีการสร้าง IV สำหรับโปเกมอนแต่ละชนิด รองรับสี่โหมด
# รูปแบบ: ID โปเกมอน (รูปแบบเดียวกับบัญชีดำ): ค่ากฎ
# หมายเหตุ: กฎแทนที่จะแทนที่โหมดทั่วไปอย่างสมบูรณ์สำหรับเผ่าพันธุ์นั้น

# 7.1 การแทนที่แบบ EXACT
# รูปแบบ: species_id: [HP, โจมตี, ป้องกัน, โจมตีพิเศษ, ป้องกันพิเศษ, ความเร็ว]
overrideExact:
  ditto: [31, 31, 31, 31, 31, 31]   # ดิตโต กำหนดค่า 31 ทั้งหมด

# 7.2 การแทนที่ผลรวมแบบ RANDOM
# รูปแบบ: species_id: ค่า IV รวมสูงสุด (ไม่บังคับ หากไม่ระบุจะใช้ maxVPerTier ทั่วไป)
overrideRandom:
  ditto: 120   # ดิตโต ใช้โหมด RANDOM ขีดจำกัดผลรวม IV ที่ 120

# 7.3 การแทนที่โหมด SET
# รูปแบบ: species_id: [IV ขั้นต่ำ, จำนวน IV สมบูรณ์ที่รับประกัน, IV สูงสุด]
# หมายเหตุ: จำนวน IV สมบูรณ์ ≤ 6 ค่าที่ไม่สมบูรณ์สุ่มในช่วง [IV ขั้นต่ำ, IV สูงสุด]
overrideSet:
  ditto: [0, 2, 20]   # ดิตโต: อย่างน้อย 2 ค่า IV สมบูรณ์ ที่เหลือสุ่ม 0~20

# 7.4 การแทนที่ช่วง MIN_MAX
# รูปแบบ: species_id: [ช่วงขั้นต่ำ, ช่วงสูงสุด]
# หมายเหตุ: แต่ละค่า IV สุ่มอิสระในช่วงนี้
overrideMinMax: {}   # ตัวอย่าง: ditto: [10, 30]

# ============================================================
# 8. คำสั่งรางวัลเมื่อเสร็จสิ้นรังศึก
# ============================================================
# เมื่อผู้เล่นเสร็จสิ้นรังศึกและได้รับโปเกมอนรางวัล สามารถเรียกคำสั่งเพิ่มเติมได้
# รองรับการสุ่มตามน้ำหนัก ตัวยึดตำแหน่ง: {player} (ชื่อผู้เล่น), {tier} (ระดับดาว 1~7), {tierIndex} (ระดับดาว 0~6)
# ============================================================
# สองรูปแบบการกำหนดค่า:
#   1. รูปแบบ Map (แนะนำ):
#      Tier1:
#        - command: "give {player} cobblemon:rare_candy 1"
#          weight: 50
#        - command: "give {player} cobblemon:super_rod 1"
#          weight: 30
#   2. รูปแบบ List (กระชับ หากไม่ระบุน้ำหนักจะใช้ค่าเริ่มต้น 100):
#      - - "give {player} cobblemon:rare_candy 1"
#        - "give {player} cobblemon:super_rod 1"
#      - []  # รายการว่างหมายถึงไม่มีรางวัล
# ============================================================
# หมายเหตุ: ไม่ต้องใส่เครื่องหมายทับ (/) นำหน้าคำสั่ง ม็อดจะจัดการให้อัตโนมัติ แต่ใส่ก็ได้
# คำสั่งทำงานด้วยสิทธิ์ OP ของเซิร์ฟเวอร์ (ระดับ 4) โปรดตรวจสอบว่าคำสั่งปลอดภัย

