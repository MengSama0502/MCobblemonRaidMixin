# ============================================================
# ไฟล์กำหนดค่าม็อด MCobblemonRaidMixin
# เข้ากันได้กับ: Fabric 1.21.1+ ต้องใช้ Cobblemon และ Necro Raid Dens
# ============================================================

# ============================================================
# 1. โหมดการสร้าง IV ทั่วไป
# ============================================================
# การตั้งค่าภาษา ตัวเลือก: zh (จีน), en (อังกฤษ), th (ไทย)
language: "zh"

# ตัวเลือก: SET, RANDOM, MIN_MAX, EXACT
#   SET    -> กำหนดบางค่าเป็น 31 (IV สมบูรณ์) ที่เหลือสุ่มในช่วงที่กำหนด
#   RANDOM -> จำกัดผลรวม IV ทั้งหมด (ค่า V รวม) แล้วสุ่มแจกจ่ายให้หกค่า
#   MIN_MAX-> แต่ละค่า IV สุ่มอิสระในช่วงของตัวเอง
#   EXACT  -> กำหนดค่า IV แบบเจาะจงตามระดับดาว
# หมายเหตุ: หากโปเกมอนมีกฎแทนที่เฉพาะเผ่าพันธุ์ กฎแทนที่จะมีความสำคัญเหนือกว่า
raidIVMode: "SET"

# ============================================================
# 2. พารามิเตอร์โหมด SET (ใช้เฉพาะเมื่อ raidIVMode = SET)
# ============================================================

# จำนวน IV สมบูรณ์ (31) ที่รับประกันต่อระดับดาว (1~7 ดาว)
# ลำดับ: ค่าแรก = 1 ดาว, ค่าที่ 7 = 7 ดาว
# ช่วงค่า: 0 ~ 6 แนะนำให้เพิ่มตามระดับดาว
guaranteedVPerTier: [0, 1, 1, 1, 2, 2, 3]

# ค่า IV ขั้นต่ำต่อค่าสถิติสำหรับค่าที่ไม่สมบูรณ์ในโหมด SET
# ใช้ร่วมกับ maxIVPerTier เพื่อกำหนดช่วงสุ่มของค่าที่ไม่สมบูรณ์
minIVPerTier: [0, 0, 0, 0, 0, 0, 0]

# ค่า IV สูงสุดต่อค่าสถิติสำหรับค่าที่ไม่สมบูรณ์ในโหมด SET
maxIVPerTier: [20, 20, 20, 20, 20, 20, 20]

# ============================================================
# 3. พารามิเตอร์โหมด RANDOM (ใช้เฉพาะเมื่อ raidIVMode = RANDOM)
# ============================================================
# ผลรวม IV สูงสุดที่อนุญาตต่อระดับดาว (ผลรวมของหกค่าสถิติทั้งหมด)
# แต่ละค่าสถิติอยู่ในช่วง 0~31 ผลรวมสูงสุดคือ 186 ค่ายิ่งต่ำ = โปเกมอนโดยรวมยิ่งอ่อนแอ
maxVPerTier: [80, 90, 100, 110, 120, 130, 140]

# ============================================================
# 4. พารามิเตอร์โหมด MIN_MAX (ใช้เฉพาะเมื่อ raidIVMode = MIN_MAX)
# ============================================================
# ค่า IV ขั้นต่ำต่อค่าสถิติต่อระดับดาว (ขอบเขตล่างของช่วงสุ่มอิสระ)
minIVRangePerTier: [0, 5, 10, 15, 20, 25, 31]

# ค่า IV สูงสุดต่อค่าสถิติต่อระดับดาว (ขอบเขตบนของช่วงสุ่มอิสระ)
maxIVRangePerTier: [10, 15, 20, 25, 31, 31, 31]

# ============================================================
# 5. พารามิเตอร์โหมด EXACT (ใช้เฉพาะเมื่อ raidIVMode = EXACT)
# ============================================================
# ค่า IV แบบเจาะจงสำหรับแต่ละระดับดาว (1~7 ดาว)
# ลำดับต้องเป็น: [HP, โจมตี, ป้องกัน, โจมตีพิเศษ, ป้องกันพิเศษ, ความเร็ว]
# แต่ละอาร์เรย์ต้องมี 6 ค่าพอดี ค่าอยู่ในช่วง 0~31
exactIVsPerTier:
  - [31, 31, 31, 31, 31, 31]   # 1 ดาว
  - [31, 31, 31, 31, 31, 31]   # 2 ดาว
  - [31, 31, 31, 31, 31, 31]   # 3 ดาว
  - [31, 31, 31, 31, 31, 31]   # 4 ดาว
  - [31, 31, 31, 31, 31, 31]   # 5 ดาว
  - [31, 31, 31, 31, 31, 31]   # 6 ดาว
  - [31, 31, 31, 31, 31, 31]   # 7 ดาว

